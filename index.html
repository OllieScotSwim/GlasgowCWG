function render(){document.getElementById('tabs').innerHTML=[`<button class="tab ${active==='overview'?'active':''}" data-tab="overview">Overview</button>`,...days.map(d=>`<button class="tab ${active===d.id?'active':''}" data-tab="${d.id}">${d.tab}</button>`),`<button class="tab ${active==='physio'?'active':''}" data-tab="physio">Physio</button>`,`<button class="tab ${active==='staff'?'active':''}" data-tab="staff">Staff Team</button>`].join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{active=b.dataset.tab;render()});document.getElementById('app').innerHTML=active==='overview'?overview():active==='staff'?staffTab():active==='physio'?physioTab():dayView(days.find(x=>x.id===active))}
function row(x){let c=norm(x.type),ps=x.people||[];return`<article class=row><div class=grid><div class="stripe ${c}"></div><div class=time><b>${x.time}</b>${x.end?`<span>to ${x.end}</span>`:''}</div><div class=main><div class=meta><span class=badge>${labels[c]||x.type}</span><span class=loc>📍 ${x.location}</span></div>${x.address?`<div class=address>${x.address}</div>`:''}<h3 class=title>${x.title}</h3><p class=details>${x.details}</p></div><div class=involved><div class=cap>👥 Involved</div><div class=chips>${x.involved.map(p=>`<span class=chip>${p}</span>`).join('')}</div>${ps.length?`<div class=cap style="margin-top:12px">Named people</div><div class=chips>${ps.map(p=>`<span class="chip named">${p}</span>`).join('')}</div>`:''}</div></div></article>`}
function overview(){return`<div class="section intro-card"><h2>Welcome</h2><p>Welcome to the info pack for the Team Scotland Swimming Preparation Camp. You'll find some general information in this tab, with other tabs showing daily schedules, physio timeslots and staff team info.</p><div class="intro-list"><a class="intro-pill" href="#training-overview">🏊 Training times</a><a class="intro-pill" href="#meal-planner">🍽 Meal planner</a><a class="intro-pill" href="#snack-station">🍌 Snack station</a><a class="intro-pill" href="#useful-contacts">📞 Useful contacts</a></div></div><div class=section id="training-overview"><h2>Swim and gym overview</h2><p class="transport-note">See available training times below. Athlete transport to and from the pool will be in people carriers driven by Lindsay Lewis, Ollie Summers, Paul Wilson and Neil Shanks.</p></div><div class="training-grid">${days.map(trainingCard).join('')}</div>${mealPlanner()}${snackStation()}<div class="section" id="useful-contacts"><h2>Useful Contacts</h2><div class="staff-grid"><div class="staff-card"><div class="staff-info"><h3>Ian Wright</h3><p class="staff-role">Team Leader</p><p class="staff-extra">07990 029781</p></div></div><div class="staff-card"><div class="staff-info"><h3>Lindsay Lewis</h3><p class="staff-role">Team Manager</p><p class="staff-extra">07952 968811</p></div></div><div class="staff-card"><div class="staff-info"><h3>Ollie Summers</h3><p class="staff-role">Assistant Team Manager</p><p class="staff-extra">07738 886151</p></div></div><div class="staff-card"><div class="staff-info"><h3>Athlete Transport</h3><p class="staff-extra">Lindsay Lewis<br>Ollie Summers<br>Paul Wilson<br>Neil Shanks</p></div></div></div></div>`}
function trainingCard(d){let swim=d.activities.filter(x=>x.type==='Swim').map(x=>`${x.time}${x.end?'–'+x.end:''}`).join(' | ')||'No swim';let gym=d.activities.filter(x=>x.type==='S&C').map(x=>`${x.time}${x.end?'–'+x.end:''}`).join(' | ')||'No gym';return`<article class="training-card"><h3>${d.date}</h3><div class="train-line"><span class="train-icon">🏊</span><div><span class="train-label">Swim</span>${swim}</div></div><div class="train-line"><span class="train-icon">💪</span><div><span class="train-label">Gym</span>${gym}</div></div></article>`}
function mealPlanner(){const mealDays=[{day:'Wednesday',sub:'Day 1',breakfast:'—',lunch:['No lunch option listed — travel / arrival day.'],dinner:['Chicken Jambalaya','Chilli Con Carne','Smokey vegetable jambalaya','Rice','Salad bar','Yoghurts and fruit salad']},{day:'Thursday',sub:'Day 2',breakfast:'Standard breakfast offering',lunch:['Marinated grilled chicken','Stuffed peppers (rice and veggies)','Salad bar','Fruit and high-protein yoghurt selection'],dinner:['Beef Bolognese / Meatballs','Tuna Pasta Bake','Quorn Mince / Lentil Bolognese','Pasta','Salad bar','Rice pudding']},{day:'Friday',sub:'Day 3',breakfast:'Standard breakfast offering',lunch:['Chicken fajitas','Bean quesadillas or veggie fajitas','Salad bar','Fruit and high-protein yoghurt selection'],dinner:['Beef or Chicken Stir-fry','Fish paella','Vegetable Paella','Rice in paella and noodles in stir-fry','Salad bar','Oat & raisin cookies']},{day:'Saturday',sub:'Day 4',breakfast:'Standard breakfast offering',lunch:['Beef lasagne','Vegetable lasagne','Salad bar','Fruit and high-protein yoghurt selection'],dinner:['Pre-order required for ballroom dinner']},{day:'Sunday',sub:'Day 5',breakfast:'Standard breakfast offering',lunch:['Chicken pasta bake','Vegetable pasta bake','Salad bar','Fruit and high-protein yoghurt selection'],dinner:['Chicken curry (tomato based)','Lemon herb baked fish','Butterbean Saag & Lentil Dhal','Rice','Salad bar & boiled veg','Fruit crumble']},{day:'Monday',sub:'Day 6',breakfast:'Standard breakfast offering',lunch:['Marinated grilled chicken','Stuffed peppers (rice and veggies)','Salad bar','Fruit and high-protein yoghurt selection'],dinner:['Beef burgers','Pulled chicken/pork or Chicken skewers with veg','Bean burgers or sweetcorn fritters','Buns, rice, potato wedges','Salad bar','Frozen yogurt']},{day:'Tuesday',sub:'Day 7',breakfast:'Standard breakfast offering',lunch:['Beef lasagne','Vegetable lasagne','Salad bar','Fruit and high-protein yoghurt selection'],dinner:['No dinner option listed — coach travel to Glasgow.']}];return`<div class=section id="meal-planner"><h2>Meal Planner</h2><p>Open each day to view the main meal options. </p><div class="meal-note"><strong>Breakfast:</strong> Assorted breads, cereals, fruit, condiments, yoghurts, overnight oats, eggs, beans, cheeses and cold meats. Drinks include tea, coffee, water, fruit juice, milk, squash and fruit-based smoothies.</div><div class="meal-note"><strong>Lunch salad bar:</strong> Vegetables, wraps, pitta breads, assorted breads, baked potato, pasta salad, couscous, mixed grains, additional protein and sauces/flavour options available across lunch service.</div></div><div class="meal-day-grid">${mealDays.map((m,i)=>`<details class="meal-day" ${i<2?'open':''}><summary>${m.sub} — ${m.day}</summary><div class="meal-day-body"><div class="meal-section"><h4>Breakfast</h4><ul><li>${m.breakfast}</li></ul></div><div class="meal-section"><h4>Lunch</h4><ul>${m.lunch.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="meal-section"><h4>Dinner</h4><ul>${m.dinner.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></details>`).join('')}</div>`}
function snackStation(){return`<div class=section id="snack-station"><h2>Snack Station</h2><p>Available throughout the camp in the hotel team room:</p></div><div class="snack-labels">${snackProducts.map((p,i)=>`<span class="snack-label"><span>${['🥤','🏋️','⚡','💧','🥣','🏋️','🍌'][i]||'•'}</span>${p}</span>`).join('')}</div>`}
function mealBlock(id){let m=meals[id];return`<section class=meal-box><h3>Lunch and dinner options</h3><div class=meal-columns><div class=meal-card><h4>Lunch</h4><p>${m.lunch}</p></div><div class=meal-card><h4>Dinner</h4><p>${m.dinner}</p></div></div></section>`}
function dayView(d){return`<section class=day-head><h2>${d.date}</h2><h1 style="font-size:clamp(28px,4vw,40px);margin-top:8px">${d.theme}</h1><p>${d.summary}</p>${d.notes.length?`<p><b style="color:white">Notes:</b> ${d.notes.join(' ')}</p>`:''}</section>${mealBlock(d.id)}<section class=list>${d.activities.map(row).join('')}</section>`}
function initials(name){return name.split(' ').filter(Boolean).map(p=>p[0]).join('').slice(0,3).toUpperCase()}function staffCard(p){return`<article class=staff-card><div class=staff-photo><img src="${p[3]}" alt="${p[0]}" onerror="this.remove();this.parentElement.textContent='${initials(p[0])}';"></div><div class=staff-info><h3>${p[0]}</h3><p class=staff-role>${p[1]}</p>${p[2]?`<p class=staff-extra>${p[2]}</p>`:''}</div></article>`}function staffTab(){return`<div class=section><h2>Staff Team</h2><p>Leadership, coaching and support contacts for the preparation camp.</p></div>${staffSections.map(s=>`<section class=staff-section><h2>${s.title}</h2><div class=staff-grid>${s.people.map(staffCard).join('')}</div></section>`).join('')}`}
function physioTab(){return`<div class=section><h2>Physio</h2><p>Please see below for physio availability throughout the prep camp.<br><strong>KO = Kerry O'Hara</strong><br><strong>JC = Jesse Castillo</strong></p></div><div class="training-grid"><div class="training-card"><h3>Thursday</h3><p>🩺 <strong>08:30–09:30</strong> Health & Wellbeing Checks – JC & KO</p><p>🏊 <strong>09:30–11:30</strong> Swim Support – KO</p><p>💨 <strong>13:40–14:00</strong> Breathwork / Recovery / Yoga – KO</p><p>🩹 <strong>14:00–16:00</strong> Physio Clinic – JC & KO</p><p>🏊 <strong>17:00–19:00</strong> Swim Support – JC</p></div><div class="training-card"><h3>Friday</h3><p>🩺 <strong>08:30–09:30</strong> Health & Wellbeing Checks – JC & KO</p><p>🏊 <strong>09:30–11:30</strong> Swim Support – KO</p><p>💨 <strong>13:40–14:00</strong> Breathwork / Recovery / Yoga – KO</p><p>🩹 <strong>14:00–16:00</strong> Physio Clinic – JC & KO</p><p>🏊 <strong>17:00–19:00</strong> Swim Support – JC</p></div><div class="training-card"><h3>Saturday</h3><p>🩺 <strong>08:30–09:30</strong> Health & Wellbeing Checks – JC & KO</p><p>🏊 <strong>09:30–11:30</strong> Swim Support – KO</p><p>🩹 <strong>14:00–16:00</strong> Physio Clinic – JC</p><p>💆 <strong>12:15–16:15</strong> Massage Appointments</p></div><div class="training-card"><h3>Sunday</h3><p>🩺 <strong>08:30–09:30</strong> Health & Wellbeing Checks – JC & KO</p><p>🏊 <strong>09:30–11:30</strong> Swim Support – KO</p><p>💨 <strong>13:40–14:00</strong> Breathwork / Recovery / Yoga – KO</p><p>🩹 <strong>14:00–16:00</strong> Physio Clinic – JC & KO</p><p>🏊 <strong>17:00–19:00</strong> Swim Support – JC</p></div><div class="training-card"><h3>Monday</h3><p>🩺 <strong>08:30–09:30</strong> Health & Wellbeing Checks – JC & KO</p><p>🏊 <strong>09:30–11:30</strong> Swim Support – KO</p><p>🩹 <strong>14:00–16:00</strong> Physio Clinic – JC</p><p>🏊 <strong>16:30–19:00</strong> Swim Support – JC</p><p>💆 <strong>12:15–15:45</strong> Massage Appointments</p></div></div><div class="section"><h2>Massage Appointments</h2><div class="staff-grid"><div class="staff-card"><div class="staff-info"><h3>Saturday 18 July</h3><p>Angharad Evans<br>Faye Rogers<br>Stephen Clegg<br>Archie Goodburn<br>Charlie Hutchison<br>Matt Ward<br>Toni Shaw<br>Scott Gibson<br>Sam Downie<br>Ollie Carter<br>Ciara Schlosshan<br>Anna Morgan<br>Stefan Krawiec</p></div></div><div class="staff-card"><div class="staff-info"><h3>Monday 20 July</h3><p>Angharad Evans<br>Keanna MacInnes<br>Evan Jones<br>Dean Fearn<br>Luke Hornsey<br>Jensen Norris<br>Evi Mackie<br>Emma Wood<br>Sean McCann<br>Jamie Ferguson<br>Evie Davis<br>Megan Barnes</p></div></div></div></div>`}
render();
</script></body></html>
